services:
  db:
    image: postgres:16-alpine
    container_name: mavix-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrator:
    build: ./MavixServer
    command: sh scripts/migrate.sh
    env_file: MavixServer/.env
    depends_on:
      db:
        condition: service_healthy

  app:
    build: ./MavixServer
    container_name: mavix-app
    env_file: MavixServer/.env
    expose:
      - "8000"
    volumes:
      - ./MavixServer/wheels:/srv/mavix/wheels:ro
      - ./MavixServer/prebuilt:/srv/mavix/prebuilt:ro
      - build_cache:/var/cache/mavix/builds
    depends_on:
      migrator:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    build: ./MavixWeb
    container_name: mavix-web
    env_file: MavixWeb/.env
    expose:
      - "3001"
    volumes:
      - ./MavixWeb/public/downloads:/app/public/downloads:ro
    depends_on:
      - app
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: mavix-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
      - web
    restart: unless-stopped

volumes:
  pgdata:
  build_cache:
  caddy_data:
  caddy_config:
